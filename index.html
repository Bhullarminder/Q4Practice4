<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Dark</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

        <body class="bg-dark d-flex justify-content-center vh-100 ">

        <div class="bg-secondary text-light p-4 rounded-4 shadow" style="width: 350px; Height:400px; ">

    <div class="text-center mb-3">
        <h2>Login</h2>
    </div>

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" id="uname" class="form-control bg-dark text-light border-0" placeholder="Enter here">
    </div>

    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="pwd" class="form-control bg-dark text-light border-0" placeholder="Enter here">
    </div>

    <div id="display" class="text-danger text-center mb-2"></div>

    <div class="d-grid gap-2">
        <button id="loginBTN" class="btn btn-info rounded-5" onclick="authenticate()">Login</button>
        <button type="reset" class="btn btn-light rounded-5">Cancel</button>
    </div>

</div>

<script>

let attempt_counter = 0;

function authenticate(){

    let username = document.getElementById("uname").value;
    let pwd = document.getElementById("pwd").value;

    let granted = "Welcome " + username + "!";
    let denied = "Access denied. Account locked after 3 attempts!";

    if (attempt_counter < 3) {

        if (username === "mrbeast67" && pwd === "12345678") {
            alert(granted);
            attempt_counter = 0;
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";
        } 
        
        else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username/password. Attempt " + attempt_counter + " of 3";
        }
    }

    if (attempt_counter >= 3) {
        alert(denied);
        document.getElementById("loginBTN").disabled = true;
    }
}

</script>

</body>
</html>
